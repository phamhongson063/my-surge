<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thư Viện — My Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f1923;
      --wht: #1a2f42;
      --gray50: #172a3a;
      --gray100: #1e3448;
      --gray200: #2a4a63;
      --gray400: #6b8ba4;
      --gray500: #a8bfd0;
      --gray700: #c8dce8;
      --gray900: #e8edf2;
      --navy: #4da3ff;
      --navy-l: rgba(77,163,255,0.12);
      --up: #00d26a;
      --up-bg: rgba(0,210,106,0.08);
      --dn: #ff4757;
      --dn-bg: rgba(255,71,87,0.08);
      --am: #ffb300;
      --teal: #2dd4bf;
      --teal-l: rgba(45,212,191,0.12);
      --teal-bd: rgba(45,212,191,0.25);
      --rose: #fb7185;
      --rose-l: rgba(251,113,133,0.12);
      --violet: #a78bfa;
      --violet-l: rgba(167,139,250,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--gray900);
      font-family: 'Noto Sans', sans-serif;
      font-size: 15px;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gray200); border-radius: 3px; }

    /* ── Layout ── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Titlebar ── */
    .titlebar {
      height: 52px;
      background: rgba(20,38,58,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
    }
    .btn-back {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--gray500);
      transition: all 0.15s;
      text-decoration: none;
    }
    .btn-back:hover { background: rgba(255,255,255,0.12); color: var(--gray900); }
    .titlebar-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: linear-gradient(145deg, #0d9488, #0f766e);
      display: flex; align-items: center; justify-content: center;
    }
    .titlebar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray900);
      letter-spacing: 0.3px;
    }
    .titlebar-sub {
      font-size: 11px;
      color: var(--gray400);
      margin-left: 2px;
    }
    .titlebar-spacer { flex: 1; }
    .search-wrap {
      position: relative;
      width: 240px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--gray400);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 7px 12px 7px 34px;
      font-size: 13px;
      color: var(--gray900);
      font-family: 'Noto Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    #searchInput::placeholder { color: var(--gray400); }
    #searchInput:focus { border-color: var(--teal); }

    /* ── Body: sidebar + main ── */
    .body-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: rgba(20,38,58,0.6);
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gray400);
      padding: 4px 8px 8px;
      margin-top: 8px;
    }
    .sidebar-label:first-child { margin-top: 0; }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
      color: var(--gray500);
      font-size: 13px;
      font-family: 'Noto Sans', sans-serif;
      text-align: left;
      width: 100%;
    }
    .cat-btn:hover { background: rgba(255,255,255,0.06); color: var(--gray900); }
    .cat-btn.active {
      background: var(--teal-l);
      color: var(--teal);
      border: 1px solid var(--teal-bd);
    }
    .cat-btn .cat-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cat-count {
      margin-left: auto;
      font-size: 11px;
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 1px 7px;
      color: var(--gray400);
    }
    .cat-btn.active .cat-count {
      background: rgba(45,212,191,0.15);
      color: var(--teal);
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray900);
    }
    .section-count {
      font-size: 12px;
      color: var(--gray400);
    }

    /* ── Article grid ── */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .article-card {
      background: var(--wht);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
    }
    .article-card:hover {
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }
    .card-thumb {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-thumb-bg {
      position: absolute; inset: 0;
      opacity: 0.15;
    }
    .card-thumb svg {
      position: relative; z-index: 1;
    }
    .card-body {
      padding: 14px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .tag-learn { background: var(--teal-l); color: var(--teal); border: 1px solid var(--teal-bd); }
    .tag-story { background: var(--rose-l); color: var(--rose); border: 1px solid rgba(251,113,133,0.25); }
    .tag-mindset { background: var(--violet-l); color: var(--violet); border: 1px solid rgba(167,139,250,0.25); }
    .tag-strategy { background: rgba(255,179,0,0.1); color: var(--am); border: 1px solid rgba(255,179,0,0.25); }
    .tag-beginner { background: var(--up-bg); color: var(--up); border: 1px solid rgba(0,210,106,0.2); }
    .tag-advanced { background: var(--dn-bg); color: var(--dn); border: 1px solid rgba(255,71,87,0.2); }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray900);
      line-height: 1.45;
    }
    .card-desc {
      font-size: 12.5px;
      color: var(--gray500);
      line-height: 1.55;
      flex: 1;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11.5px;
      color: var(--gray400);
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: auto;
    }
    .card-meta svg { flex-shrink: 0; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 80px 20px;
      color: var(--gray400);
      text-align: center;
    }
    .empty-state p { font-size: 14px; }

    /* ── Article Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-panel {
      background: #132030;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(12px) scale(0.98);
      transition: transform 0.2s;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }
    .modal-overlay.open .modal-panel {
      transform: translateY(0) scale(1);
    }
    .modal-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      flex-shrink: 0;
    }
    .modal-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .modal-header-info { flex: 1; }
    .modal-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--gray900);
      line-height: 1.35;
      margin-bottom: 8px;
    }
    .modal-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--gray400);
      flex-wrap: wrap;
    }
    .btn-close {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--gray500);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-close:hover { background: rgba(255,71,87,0.15); color: var(--dn); border-color: rgba(255,71,87,0.3); }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }
    /* Article typography */
    .article-content h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--teal);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(45,212,191,0.15);
    }
    .article-content h2:first-child { margin-top: 0; }
    .article-content p {
      font-size: 14px;
      line-height: 1.75;
      color: var(--gray700);
      margin-bottom: 14px;
    }
    .article-content ul, .article-content ol {
      padding-left: 20px;
      margin-bottom: 14px;
    }
    .article-content li {
      font-size: 14px;
      line-height: 1.75;
      color: var(--gray700);
      margin-bottom: 6px;
    }
    .article-content strong { color: var(--gray900); font-weight: 700; }
    .article-content em { color: var(--am); font-style: normal; font-weight: 600; }
    .highlight-box {
      background: var(--teal-l);
      border: 1px solid var(--teal-bd);
      border-left: 3px solid var(--teal);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      margin: 16px 0;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--gray700);
    }
    .highlight-box.rose {
      background: var(--rose-l);
      border-color: rgba(251,113,133,0.25);
      border-left-color: var(--rose);
    }
    .highlight-box.violet {
      background: var(--violet-l);
      border-color: rgba(167,139,250,0.25);
      border-left-color: var(--violet);
    }
    .highlight-box.amber {
      background: rgba(255,179,0,0.08);
      border-color: rgba(255,179,0,0.2);
      border-left-color: var(--am);
    }
    .key-number {
      display: inline-block;
      background: rgba(45,212,191,0.15);
      color: var(--teal);
      border-radius: 6px;
      padding: 1px 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- Titlebar -->
  <header class="titlebar">
    <a href="/" class="btn-back" title="Về trang chủ">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <div class="titlebar-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div>
      <div class="titlebar-title">Thư Viện</div>
      <div class="titlebar-sub">Học & Đọc về chứng khoán</div>
    </div>
    <div class="titlebar-spacer"></div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Tìm bài viết..."/>
    </div>
  </header>

  <div class="body-wrap">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-label">Danh mục</div>
      <button class="cat-btn active" data-cat="all">
        <span class="cat-icon" style="background:rgba(45,212,191,0.15)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </span>
        Tất cả
        <span class="cat-count" id="cnt-all">0</span>
      </button>
      <button class="cat-btn" data-cat="learn">
        <span class="cat-icon" style="background:rgba(45,212,191,0.12)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </span>
        Học chứng khoán
        <span class="cat-count" id="cnt-learn">0</span>
      </button>
      <button class="cat-btn" data-cat="story">
        <span class="cat-icon" style="background:rgba(251,113,133,0.12)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fb7185" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </span>
        Câu chuyện đầu tư
        <span class="cat-count" id="cnt-story">0</span>
      </button>
      <button class="cat-btn" data-cat="mindset">
        <span class="cat-icon" style="background:rgba(167,139,250,0.12)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </span>
        Tâm lý đầu tư
        <span class="cat-count" id="cnt-mindset">0</span>
      </button>
      <button class="cat-btn" data-cat="strategy">
        <span class="cat-icon" style="background:rgba(255,179,0,0.1)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#ffb300" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </span>
        Chiến lược
        <span class="cat-count" id="cnt-strategy">0</span>
      </button>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent">
      <div class="section-header">
        <div class="section-title" id="sectionTitle">Tất cả bài viết</div>
        <div class="section-count" id="sectionCount"></div>
      </div>
      <div class="articles-grid" id="articlesGrid"></div>
    </main>

  </div>
</div>

<!-- Article Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-panel">
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-header-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="btn-close" id="btnClose">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body article-content" id="modalBody"></div>
  </div>
</div>

<script>
// ── Article data ──
const ARTICLES = [
  // ── HỌC CHỨNG KHOÁN ──
  {
    id: 1,
    cat: 'learn',
    level: 'beginner',
    title: 'RSI là gì? Hướng dẫn sử dụng chỉ báo sức mạnh tương đối',
    desc: 'Tìm hiểu chỉ báo RSI (Relative Strength Index), cách đọc vùng mua bán quá mức và tín hiệu phân kỳ trong phân tích kỹ thuật.',
    tags: ['learn', 'beginner'],
    readTime: '8 phút',
    thumb: '#0d9488',
    thumbIcon: `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(45,212,191,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
    iconBg: 'linear-gradient(135deg,#0d9488,#0f766e)',
    content: `
      <h2>RSI là gì?</h2>
      <p>RSI (Relative Strength Index - Chỉ số sức mạnh tương đối) là chỉ báo động lực được phát triển bởi J. Welles Wilder Jr. vào năm 1978. RSI đo lường tốc độ và mức độ thay đổi giá, dao động trong khoảng từ <strong>0 đến 100</strong>.</p>
      <div class="highlight-box">
        <strong>Công thức tính:</strong><br/>
        RSI = 100 − [100 ÷ (1 + RS)]<br/>
        Trong đó RS = Trung bình tăng / Trung bình giảm (thường dùng 14 phiên)
      </div>
      <h2>Cách đọc RSI</h2>
      <ul>
        <li><strong>RSI > 70:</strong> Vùng <em>mua quá mức</em> (Overbought) — có thể sắp điều chỉnh</li>
        <li><strong>RSI < 30:</strong> Vùng <em>bán quá mức</em> (Oversold) — có thể sắp hồi phục</li>
        <li><strong>RSI = 50:</strong> Trung tính, không có xu hướng rõ ràng</li>
      </ul>
      <h2>Tín hiệu phân kỳ (Divergence)</h2>
      <p>Đây là tín hiệu mạnh nhất của RSI:</p>
      <ul>
        <li><strong>Phân kỳ dương (Bullish Divergence):</strong> Giá tạo đáy thấp hơn, nhưng RSI tạo đáy cao hơn → tín hiệu đảo chiều tăng.</li>
        <li><strong>Phân kỳ âm (Bearish Divergence):</strong> Giá tạo đỉnh cao hơn, nhưng RSI tạo đỉnh thấp hơn → tín hiệu đảo chiều giảm.</li>
      </ul>
      <div class="highlight-box rose">
        <strong>Lưu ý thực tế:</strong> RSI trong xu hướng tăng mạnh có thể nằm ở vùng 60–80 trong thời gian dài mà không giảm. Đừng chỉ bán vì RSI > 70 khi cổ phiếu đang trong uptrend mạnh.

      <h2>MACD là gì?</h2>
      <p>MACD (Moving Average Convergence Divergence) được Gerald Appel phát triển vào cuối những năm 1970. Đây là chỉ báo theo xu hướng kết hợp với đo lường động lực, gồm 3 thành phần:</p>

        <li><strong>Đường Signal:</strong> EMA(9) của MACD</li>

    content: `
      <h2>Bollinger Bands là gì?</h2>
      <p>Bollinger Bands được John Bollinger phát triển vào đầu những năm 1980, gồm 3 dải:</p>
      <ul>
        <li><strong>Dải giữa (Middle Band):</strong> SMA(20) — đường trung bình động 20 phiên</li>
        <li><strong>Dải trên (Upper Band):</strong> SMA(20) + 2 × Độ lệch chuẩn</li>
        <li><strong>Dải dưới (Lower Band):</strong> SMA(20) − 2 × Độ lệch chuẩn</li>
      </ul>
      <div class="highlight-box violet">
        Khoảng 95% giá nằm trong hai dải. Khi giá chạm dải trên/dưới, đó là trạng thái bất thường về mặt thống kê.
      </div>
      <h2>Các chiến lược sử dụng</h2>
      <h2>1. Bollinger Squeeze (Co thắt)</h2>
      <p>Khi hai dải thu hẹp lại gần nhau → biến động thấp → chuẩn bị bứt phá mạnh. Đây là thời điểm cần chú ý vì bứt phá có thể xảy ra bất cứ lúc nào.</p>
      <h2>2. Giao dịch ngược xu hướng (Mean Reversion)</h2>
      <p>Trong thị trường sideway: giá chạm dải trên → cân nhắc bán, giá chạm dải dưới → cân nhắc mua.</p>
      <h2>3. Ride the Bands (Đi theo dải)</h2>
      <p>Trong uptrend mạnh, giá liên tục đi dọc dải trên (Riding the Upper Band). Đây là dấu hiệu cổ phiếu rất mạnh, <strong>không nên bán</strong> chỉ vì giá ở dải trên.</p>
      <div class="highlight-box rose">
        <strong>Sai lầm phổ biến:</strong> Tự động bán khi giá chạm dải trên trong uptrend mạnh. Bollinger Bands hoạt động tốt nhất trong thị trường sideway, kém hiệu quả trong xu hướng mạnh.
      </div>
    `
  },

      <h2>Triết lý đầu tư giá trị</h2>
      <p>Buffett học từ Benjamin Graham — tìm kiếm cổ phiếu đang giao dịch <em>dưới giá trị nội tại</em>. Nhưng ông đã tiến thêm bước nữa khi gặp Charlie Munger: <strong>"Mua một công ty tuyệt vời ở giá hợp lý, tốt hơn mua một công ty bình thường ở giá rẻ."</strong></p>
      <div class="highlight-box amber">
        <strong>"Rule No. 1: Never lose money. Rule No. 2: Never forget Rule No. 1."</strong><br/>— Warren Buffett
      </div>
      <h2>Moat — Hào kinh tế</h2>
      <p>Buffett tìm kiếm các công ty có <strong>competitive moat</strong> (hào kinh tế) — lợi thế cạnh tranh bền vững ngăn đối thủ xâm phạm: thương hiệu mạnh (Coca-Cola), chi phí chuyển đổi cao (American Express), mạng lưới rộng (GEICO).</p>
      <h2>Bài học về giá trị kép</h2>
      <p>Buffett mua Coca-Cola năm 1988 với tổng giá trị 1.3 tỷ USD. Năm 2024, giá trị đó vượt 25 tỷ USD — chưa kể cổ tức hàng năm. <strong>Compound interest là kỳ quan thứ 8 của thế giới.</strong></p>
      <div class="highlight-box">

        1. Đầu tư vào những gì bạn hiểu<br/>
        2. Hãy tham lam khi người khác sợ hãi<br/>
        3. Chỉ mua cổ phiếu bạn sẵn sàng nắm giữ nếu thị trường đóng cửa 10 năm<br/>
        4. Thị trường là công cụ chuyển tiền từ người thiếu kiên nhẫn sang người kiên nhẫn
      </div>
    `

      <h2>Tại sao cảm xúc phá hoại đầu tư?</h2>
      <p>Nghiên cứu của Dalbar Inc. cho thấy nhà đầu tư cá nhân Mỹ chỉ đạt <span class="key-number">3.66%/năm</span> trong 20 năm, trong khi S&P 500 đạt 9.85%/năm. Lý do chính: <strong>mua cao, bán thấp</strong> do tâm lý đám đông.</p>
      <h2>Vòng tròn cảm xúc của thị trường</h2>
      <p>Thị trường đi qua các giai đoạn cảm xúc có thể đoán trước:</p>
      <ul>
        <li><strong>Lạc quan → Hưng phấn → Thỏa mãn</strong> (thị trường đang tăng)</li>
        <li><strong>Lo lắng → Phủ nhận → Sợ hãi</strong> (thị trường bắt đầu giảm)</li>
        <li><strong>Tuyệt vọng → Hoảng loạn → Đầu hàng</strong> (đáy thị trường)</li>
        <li><strong>Hy vọng → Nhẹ nhõm → Lạc quan</strong> (thị trường phục hồi)</li>
      </ul>
      <div class="highlight-box violet">
        <strong>Quy tắc ngược chiều (Contrarian):</strong> Khi mọi người trên báo đài đều nói về cổ phiếu và thị trường tuyệt vời → đó là lúc cẩn thận. Khi mọi người tuyệt vọng và nói "đừng mua cổ phiếu nữa" → đó thường là đáy.
      </div>
      <h2>FOMO — Nỗi sợ bỏ lỡ</h2>
      <p>Fear Of Missing Out đẩy nhà đầu tư mua vào khi giá đã tăng cao vì "sợ bỏ lỡ cơ hội". Đây là nguyên nhân phổ biến nhất khiến nhà đầu tư mới thua lỗ — mua ở đỉnh.</p>
      <h2>Cách kiểm soát cảm xúc</h2>
      <ul>
        <li><strong>Có kế hoạch cụ thể:</strong> Xác định điểm mua, điểm cắt lỗ, mục tiêu chốt lời TRƯỚC khi vào lệnh</li>
        <li><strong>Nhật ký giao dịch:</strong> Ghi lại lý do mua/bán và cảm xúc lúc đó để học từ bản thân</li>
        <li><strong>Sizing phù hợp:</strong> Đừng đầu tư quá nhiều tiền vào một vị thế đến mức mất ngủ</li>
        <li><strong>Tắt màn hình:</strong> Kiểm tra giá ít hơn = ít cơ hội để cảm xúc can thiệp</li>

      </div>

      <h2>Hệ thống vs. Cảm xúc</h2>
      <p>Các nhà đầu tư thành công nhất không nhất thiết thông minh hơn, họ chỉ có <strong>hệ thống tốt hơn và tuân thủ nó nghiêm ngặt hơn</strong>.</p>

        <li>Tôi sẽ mua <em>bao nhiêu</em>? (position sizing)</li>
        <li>Tôi sẽ bán khi nào? (cắt lỗ và chốt lời)</li>

      <h2>Cắt lỗ — Kỹ năng quan trọng nhất</h2>

// ── State ──
let currentCat = 'all';
let searchQuery = '';

// ── Count badges ──
function updateCounts() {
  const cats = ['all', 'learn', 'story', 'mindset', 'strategy'];
  cats.forEach(cat => {
    const filtered = cat === 'all' ? ARTICLES : ARTICLES.filter(a => a.cat === cat || (a.tags && a.tags.includes(cat)));
    const el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = filtered.length;
  });
}

// ── Render ──
function getTagHtml(tags) {
  const map = {
    learn: ['tag-learn', 'Học'],
    story: ['tag-story', 'Câu chuyện'],
    mindset: ['tag-mindset', 'Tâm lý'],
    strategy: ['tag-strategy', 'Chiến lược'],
    beginner: ['tag-beginner', 'Cơ bản'],
    advanced: ['tag-advanced', 'Nâng cao'],
  };
  return (tags || []).map(t => {
    const m = map[t];
    if (!m) return '';
    return `<span class="tag ${m[0]}">${m[1]}</span>`;
  }).join('');
}

function render() {
  const grid = document.getElementById('articlesGrid');
  const q = searchQuery.toLowerCase();

  let filtered = ARTICLES.filter(a => {
    const catMatch = currentCat === 'all'
      ? true
      : a.cat === currentCat || (a.tags && a.tags.includes(currentCat));
    const searchMatch = !q
      ? true
      : a.title.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q);
    return catMatch && searchMatch;
  });

  document.getElementById('sectionCount').textContent = filtered.length + ' bài viết';

  const titles = { all: 'Tất cả bài viết', learn: 'Học chứng khoán', story: 'Câu chuyện đầu tư', mindset: 'Tâm lý đầu tư', strategy: 'Chiến lược' };
  document.getElementById('sectionTitle').textContent = searchQuery ? `Kết quả cho "${searchQuery}"` : (titles[currentCat] || 'Bài viết');

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>Không tìm thấy bài viết nào</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <div class="article-card" onclick="openArticle(${a.id})">
      <div class="card-thumb" style="background: linear-gradient(135deg, ${a.thumb}22, ${a.thumb}11)">
        <div class="card-thumb-bg" style="background: radial-gradient(circle at 60% 40%, ${a.thumb}44, transparent 70%)"></div>
        ${a.thumbIcon}
      </div>
      <div class="card-body">
        <div class="card-tags">${getTagHtml(a.tags)}</div>
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.desc}</div>
        <div class="card-meta">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${a.readTime} đọc
        </div>
      </div>
    </div>
  `).join('');
}

// ── Modal ──
function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modalIcon').style.background = a.iconBg;
  document.getElementById('modalIcon').innerHTML = a.thumbIcon.replace('width="40" height="40"', 'width="22" height="22"');
  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('modalMeta').innerHTML = `
    <span>${getTagHtml(a.tags)}</span>
    <span style="display:flex;align-items:center;gap:4px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      ${a.readTime} đọc
    </span>
  `;
  document.getElementById('modalBody').innerHTML = a.content;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Events ──
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    render();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

document.getElementById('btnClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ──
updateCounts();
render();
</script>
