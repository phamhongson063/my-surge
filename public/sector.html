<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ngành — My Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', "monospace"],
            display: ["Syne", "sans-serif"],
            sans: ['"Inter"', "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .sector-card {
      transition: transform .15s ease, box-shadow .15s ease;
      cursor: pointer;
    }
    .sector-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,.1);
    }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      font-size: 14px; font-weight: 500; text-decoration: none;
      color: #94a3b8; transition: color .15s, background .15s;
    }
    .nav-link:hover { color: #1e293b; background: #f1f5f9; }
    .nav-link.active { color: #3b82f6; background: #eff6ff; font-weight: 600; }
    input::placeholder { color: #94a3b8; }
    input:focus { border-color: #93c5fd !important; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      #sidebar { display: none; }
      #sidebar.open { display: flex !important; position: fixed; inset: 0; z-index: 50; width: 260px !important; }
      #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40; }
      #overlay.open { display: block; }
      #mobileBar { display: flex !important; }
      .main-header { padding: 16px 16px 12px !important; }
      .main-search { padding: 12px 16px 4px !important; }
      .main-grid { padding: 12px 16px 40px !important; grid-template-columns: 1fr 1fr !important; }
    }
    @media (max-width: 479px) {
      .main-grid { grid-template-columns: 1fr !important; }
    }
    #mobileBar { display: none; }
  </style>
</head>
<body class="h-full font-sans flex" style="background:#f1f5f9">

  <!-- Overlay mobile -->
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- ═══ MOBILE TOP BAR ═══ -->
  <div id="mobileBar" style="position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid #e2e8f0;z-index:30;align-items:center;padding:0 16px;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
    <button onclick="openSidebar()" style="width:36px;height:36px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#0f172a">My Stock</div>
    <div style="flex:1"></div>
    <div style="font-size:13px;font-weight:600;color:#3b82f6">Ngành</div>
  </div>

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar" class="shrink-0 flex flex-col sticky top-0 h-screen" style="width:248px;background:#fff;border-right:1px solid #e2e8f0;box-shadow:2px 0 8px rgba(0,0,0,.04)">
    <!-- Logo -->
    <div style="padding:22px 20px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 4px 12px rgba(99,102,241,.3)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M7 16l4-5 4 3 4-6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#0f172a;letter-spacing:-.4px">My Stock</div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto p-3 flex flex-col gap-1">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;padding:8px 14px 4px;text-transform:uppercase">Menu</div>
      <a href="/surge.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Volume Surge
      </a>
      <a href="/detail.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/></svg>
        Phân tích chi tiết
      </a>
      <a href="/watchlist.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Watchlist
      </a>
      <a href="/sector.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Ngành
      </a>
    </nav>

    <div style="padding:14px 20px;border-top:1px solid #f1f5f9;font-size:12px;color:#94a3b8">
      Nguồn: CafeF
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="flex-1 overflow-y-auto" style="padding-top:0" id="mainContent">
    <!-- Header -->
    <div class="main-header" style="padding:32px 36px 24px;background:#fff;border-bottom:1px solid #e2e8f0">
      <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#0f172a;letter-spacing:-.5px;margin-bottom:6px">
        Phân loại Ngành
      </div>
      <div id="subTitle" style="font-size:15px;color:#64748b">Đang tải dữ liệu...</div>
    </div>

    <!-- Search -->
    <div class="main-search" style="padding:20px 36px 4px">
      <div style="position:relative;max-width:400px">
        <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="text" placeholder="Tìm ngành..."
          style="width:100%;padding:10px 14px 10px 40px;background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;color:#0f172a;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s"
          oninput="renderCards()"
        />
      </div>
    </div>

    <!-- Cards grid -->
    <div id="grid" class="main-grid" style="padding:16px 36px 48px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">
    </div>
  </main>

  <script>
    const ACCENTS = [
      {bg:"#eff6ff",border:"#bfdbfe",icon:"#3b82f6",bar:"#3b82f6"},
      {bg:"#f0fdf4",border:"#bbf7d0",icon:"#22c55e",bar:"#22c55e"},
      {bg:"#fdf4ff",border:"#e9d5ff",icon:"#a855f7",bar:"#a855f7"},
      {bg:"#fff7ed",border:"#fed7aa",icon:"#f97316",bar:"#f97316"},
      {bg:"#fef2f2",border:"#fecaca",icon:"#ef4444",bar:"#ef4444"},
      {bg:"#f0fdfa",border:"#99f6e4",icon:"#14b8a6",bar:"#14b8a6"},
      {bg:"#fefce8",border:"#fde68a",icon:"#eab308",bar:"#eab308"},
      {bg:"#eef2ff",border:"#c7d2fe",icon:"#6366f1",bar:"#6366f1"},
      {bg:"#fff1f2",border:"#fecdd3",icon:"#f43f5e",bar:"#f43f5e"},
      {bg:"#f0f9ff",border:"#bae6fd",icon:"#0ea5e9",bar:"#0ea5e9"},
      {bg:"#fdf2f8",border:"#f9a8d4",icon:"#ec4899",bar:"#ec4899"},
      {bg:"#f7fee7",border:"#d9f99d",icon:"#84cc16",bar:"#84cc16"},
    ];

    function getIcon(name) {
      const n = name.toLowerCase();
      if (n.includes("ngân hàng")) return '<path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("tài chính") || n.includes("chứng khoán")) return '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16 7 22 7 22 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("bảo hiểm")) return '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("bất động sản")) return '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("xây dựng")) return '<path d="M2 20h20M4 20V10l8-6 8 6v10M10 20v-5h4v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("vật liệu")) return '<path d="M2 20h20M4 20V10l8-6 8 6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("điện năng") || n.includes("điện tử")) return '<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("dầu khí") || n.includes("năng lượng")) return '<ellipse cx="12" cy="5" rx="9" ry="3" stroke="currentColor" stroke-width="2"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("thực phẩm") || n.includes("đồ uống")) return '<path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("thủy sản")) return '<path d="M6.5 17.5l-1-7.5 5.5 2.5 1-5 4.5 6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 12c-4.4 4.4-9.6 6-16 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("nông nghiệp") || n.includes("phân bón")) return '<path d="M12 22V12M12 12C12 7 8 3 3 3s3 9 9 9zM12 12c0-5 4-9 9-9s-3 9-9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("công nghệ")) return '<rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("dược phẩm") || n.includes("y tế")) return '<path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("thép") || n.includes("kim loại")) return '<path d="M2 20h20M6 20V9l6-5 6 5v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("khai khoáng") || n.includes("than")) return '<path d="M2 22l10-10M16 8l-4 4M12 12l4 4M22 2L12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("hóa chất")) return '<path d="M9 3H7L3 17a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3L17 3h-2M9 3h6M9 3v5l3 3 3-3V3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("dệt may")) return '<path d="M6 3l6 6 6-6M3 9h18M3 15h18M6 21l6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("nhựa") || n.includes("bao bì")) return '<rect x="3" y="8" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M1 8l2-5h18l2 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("vận tải") || n.includes("logistics")) return '<rect x="1" y="3" width="15" height="13" rx="1" stroke="currentColor" stroke-width="2"/><path d="M16 8h4l3 5v4h-7V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/><circle cx="18.5" cy="18.5" r="2.5" stroke="currentColor" stroke-width="2"/>';
      if (n.includes("cơ khí") || n.includes("sản xuất")) return '<circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("ô tô")) return '<path d="M5 17H3a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h11l5 5v7a2 2 0 0 1-2 2h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="17" r="2" stroke="currentColor" stroke-width="2"/><circle cx="15" cy="17" r="2" stroke="currentColor" stroke-width="2"/>';
      if (n.includes("bán lẻ") || n.includes("thương mại")) return '<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2"/><path d="M16 10a4 4 0 0 1-8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("du lịch") || n.includes("giải trí")) return '<circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("giáo dục")) return '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      if (n.includes("nội thất") || n.includes("gia dụng")) return '<path d="M20 9V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2M1 9h22v11H1z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("quảng cáo") || n.includes("truyền thông")) return '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.9 2.2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      if (n.includes("dịch vụ") || n.includes("tiện ích")) return '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
      return '<rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="2"/>';
    }

    let allSectors = [];

    function renderCards() {
      const q = document.getElementById("searchInput").value.toLowerCase().trim();
      const filtered = q ? allSectors.filter(s => s.name.toLowerCase().includes(q)) : allSectors;
      document.getElementById("grid").innerHTML = filtered.map((s, i) => {
        const ac = ACCENTS[i % ACCENTS.length];
        const icon = getIcon(s.name);
        const hose  = s.stocks.filter(x => x.san === "HOSE").length;
        const hastc = s.stocks.filter(x => x.san === "HASTC").length;
        const pHose = Math.round(hose / s.count * 100);
        return `
          <div class="sector-card" onclick="location.href='/sector-detail.html?sector=${encodeURIComponent(s.name)}'"
            style="background:#fff;border:1.5px solid ${ac.border};border-radius:16px;padding:22px 22px 18px;box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px">
              <div style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:${ac.bg}">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" color="${ac.icon}">${icon}</svg>
              </div>
              <div style="flex:1;min-width:0;padding-top:2px">
                <div style="font-weight:700;font-size:15px;line-height:1.3;color:#0f172a">${s.name}</div>
                <div style="font-size:13px;color:#64748b;margin-top:3px;font-weight:500">${s.count} cổ phiếu</div>
              </div>
            </div>
            <!-- Progress bar HOSE vs HNX -->
            <div style="height:5px;border-radius:99px;background:#f1f5f9;margin-bottom:10px;overflow:hidden">
              <div style="height:100%;width:${pHose}%;background:${ac.bar};border-radius:99px;transition:width .5s"></div>
            </div>
            <div style="display:flex;gap:14px">
              <span style="font-size:13px;color:#64748b;font-weight:500">
                HOSE <span style="color:${ac.icon};font-weight:700">${hose}</span>
              </span>
              <span style="font-size:13px;color:#64748b;font-weight:500">
                HNX <span style="color:#475569;font-weight:700">${hastc}</span>
              </span>
            </div>
          </div>`;
      }).join("");
    }

    function openSidebar() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("overlay").classList.add("open");
    }
    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("open");
    }
    // Thêm padding-top cho main khi mobile bar hiển thị
    if (window.innerWidth < 768) {
      document.getElementById("mainContent").style.paddingTop = "52px";
    }
    window.addEventListener("resize", () => {
      document.getElementById("mainContent").style.paddingTop =
        window.innerWidth < 768 ? "52px" : "0";
    });

    async function init() {
      try {
        const data = await fetch("/api/sectors").then(r => r.json());
        allSectors = data;
        const total = data.reduce((s, g) => s + g.count, 0);
        document.getElementById("subTitle").textContent =
          `${data.length} nhóm ngành  •  ${total} cổ phiếu`;
        renderCards();
      } catch (e) {
        document.getElementById("subTitle").textContent = "Lỗi tải dữ liệu: " + e.message;
      }
    }
    init();
  </script>
</body>
</html>
