<!DOCTYPE html>
<html lang="vi" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi tiết Ngành — My Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"IBM Plex Mono"', "monospace"],
              display: ["Syne", "sans-serif"],
              sans: ['"Inter"', "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        color: #94a3b8;
        transition: color 0.15s, background 0.15s;
      }
      .nav-link:hover {
        color: #1e293b;
        background: #f1f5f9;
      }
      .nav-link.active {
        color: #3b82f6;
        background: #eff6ff;
        font-weight: 600;
      }
      .stock-row {
        display: grid;
        grid-template-columns: 90px 1fr 100px 1fr;
        align-items: center;
        padding: 12px 16px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.12s;
        text-decoration: none;
        color: inherit;
        border-bottom: 1px solid #f8fafc;
      }
      .stock-row:hover {
        background: #f8fafc;
      }
      .san-badge {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 3px 9px;
        border-radius: 6px;
        font-family: "IBM Plex Mono", monospace;
        display: inline-block;
      }
      .san-hose {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .san-hastc {
        background: #ede9fe;
        color: #6d28d9;
      }
      .san-upcom {
        background: #d1fae5;
        color: #065f46;
      }
      input::placeholder {
        color: #94a3b8;
      }
      input:focus {
        border-color: #93c5fd !important;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }
      select:focus {
        outline: none;
        border-color: #93c5fd !important;
      }
      .filter-btn {
        padding: 7px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        border: 1.5px solid;
        transition: all 0.15s;
      }

      /* ── Mobile ── */
      @media (max-width: 767px) {
        #sidebar {
          display: none;
        }
        #sidebar.open {
          display: flex !important;
          position: fixed;
          inset: 0;
          z-index: 50;
          width: 260px !important;
        }
        #overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.35);
          z-index: 40;
        }
        #overlay.open {
          display: block;
        }
        #mobileBar {
          display: flex !important;
        }
        .page-header {
          padding: 16px 16px 12px !important;
        }
        .controls-bar {
          padding: 10px 12px !important;
          gap: 8px !important;
        }
        .table-wrap {
          padding: 0 10px 32px !important;
        }
        .filter-btn {
          padding: 6px 10px !important;
          font-size: 12px !important;
        }
        .stock-row {
          grid-template-columns: 72px 1fr 72px !important;
        }
        .col-nganh {
          display: none;
        }
        .hdr-nganh {
          display: none;
        }
      }
      #mobileBar {
        display: none;
      }
    </style>
  </head>
  <body class="h-full font-sans flex" style="background: #f1f5f9">
    <!-- Overlay mobile -->
    <div id="overlay" onclick="closeSidebar()"></div>

    <!-- ═══ MOBILE TOP BAR ═══ -->
    <div
      id="mobileBar"
      style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: #fff;
        border-bottom: 1px solid #e2e8f0;
        z-index: 30;
        align-items: center;
        padding: 0 14px;
        gap: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      "
    >
      <button
        onclick="openSidebar()"
        style="
          width: 36px;
          height: 36px;
          border-radius: 10px;
          border: 1.5px solid #e2e8f0;
          background: #f8fafc;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          flex-shrink: 0;
        "
      >
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#475569"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <a
        href="/sector.html"
        style="
          display: flex;
          align-items: center;
          gap: 4px;
          font-size: 13px;
          color: #64748b;
          text-decoration: none;
          font-weight: 500;
          flex-shrink: 0;
        "
      >
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
        Ngành
      </a>
      <div
        id="mobileTitleBar"
        style="
          flex: 1;
          font-family: 'Syne', sans-serif;
          font-weight: 800;
          font-size: 15px;
          color: #0f172a;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        "
      ></div>
    </div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside
      id="sidebar"
      class="shrink-0 flex flex-col sticky top-0 h-screen"
      style="
        width: 248px;
        background: #fff;
        border-right: 1px solid #e2e8f0;
        box-shadow: 2px 0 8px rgba(0, 0, 0, 0.04);
      "
    >
      <div
        style="
          padding: 22px 20px 18px;
          border-bottom: 1px solid #f1f5f9;
          display: flex;
          align-items: center;
          gap: 12px;
        "
      >
        <div
          style="
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
          "
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path
              d="M3 3v18h18"
              stroke="#fff"
              stroke-width="2.2"
              stroke-linecap="round"
            />
            <path
              d="M7 16l4-5 4 3 4-6"
              stroke="#fff"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div
          style="
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 17px;
            color: #0f172a;
            letter-spacing: -0.4px;
          "
        >
          My Stock
        </div>
      </div>

      <nav class="flex-1 overflow-y-auto p-3 flex flex-col gap-1">
        <div
          style="
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 0.8px;
            padding: 8px 14px 4px;
            text-transform: uppercase;
          "
        >
          Menu
        </div>
        <a href="/surge.html" class="nav-link">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M18 20V10M12 20V4M6 20v-6" />
          </svg>
          Volume Surge
        </a>
        <a href="/detail.html" class="nav-link">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35M11 8v6M8 11h6" />
          </svg>
          Phân tích chi tiết
        </a>
        <a href="/watchlist.html" class="nav-link">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            />
          </svg>
          Watchlist
        </a>
        <a href="/sector.html" class="nav-link active">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path
              d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
            />
          </svg>
          Ngành
        </a>
      </nav>

      <div
        style="
          padding: 14px 20px;
          border-top: 1px solid #f1f5f9;
          font-size: 12px;
          color: #94a3b8;
        "
      >
        Nguồn: SSI iBoard (ICB)
      </div>
    </aside>

    <!-- ═══ MAIN ═══ -->
    <main
      id="mainContent"
      class="flex-1 flex flex-col"
      style="min-height: 0; overflow: hidden"
    >
      <!-- Header -->
      <div
        class="page-header"
        style="
          padding: 28px 36px 22px;
          background: #fff;
          border-bottom: 1px solid #e2e8f0;
          flex-shrink: 0;
        "
      >
        <a
          href="/sector.html"
          style="
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 14px;
            font-weight: 500;
            transition: color 0.15s;
          "
          onmouseenter="this.style.color='#3b82f6'"
          onmouseleave="this.style.color='#64748b'"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <path d="M15 18l-6-6 6-6" />
          </svg>
          Tất cả ngành
        </a>

        <div
          style="
            display: flex;
            align-items: flex-end;
            gap: 20px;
            flex-wrap: wrap;
          "
        >
          <div>
            <div
              id="pageTitle"
              style="
                font-family: 'Syne', sans-serif;
                font-size: 26px;
                font-weight: 800;
                color: #0f172a;
                letter-spacing: -0.5px;
              "
            >
              —
            </div>
            <div
              id="pageSub"
              style="
                font-size: 14px;
                color: #64748b;
                margin-top: 4px;
                font-weight: 500;
              "
            >
              Đang tải...
            </div>
          </div>
          <div
            id="statPills"
            style="display: flex; gap: 8px; padding-bottom: 3px"
          ></div>
        </div>
      </div>

      <!-- Controls -->
      <div
        class="controls-bar"
        style="
          padding: 16px 36px;
          display: flex;
          align-items: center;
          gap: 12px;
          flex-wrap: wrap;
          flex-shrink: 0;
          background: #fff;
          border-bottom: 1px solid #e2e8f0;
        "
      >
        <!-- Search -->
        <div
          style="
            position: relative;
            flex: 1;
            min-width: 200px;
            max-width: 340px;
          "
        >
          <svg
            style="
              position: absolute;
              left: 12px;
              top: 50%;
              transform: translateY(-50%);
              color: #94a3b8;
            "
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            id="searchInput"
            type="text"
            placeholder="Tìm mã, tên công ty..."
            style="
              width: 100%;
              padding: 9px 12px 9px 34px;
              background: #f8fafc;
              border: 1.5px solid #e2e8f0;
              border-radius: 10px;
              color: #0f172a;
              font-size: 14px;
              outline: none;
              transition: border-color 0.15s, box-shadow 0.15s;
            "
            oninput="renderTable()"
          />
        </div>
        <!-- Filter sàn -->
        <div style="display: flex; gap: 6px">
          <button
            onclick="setSan('')"
            id="btnAll"
            class="filter-btn"
            style="border-color: #cbd5e1; background: #f1f5f9; color: #475569"
          >
            Tất cả
          </button>
          <button
            onclick="setSan('HOSE')"
            id="btnHose"
            class="filter-btn"
            style="border-color: #bfdbfe; background: #fff; color: #1d4ed8"
          >
            HOSE
          </button>
          <button
            onclick="setSan('HASTC')"
            id="btnHastc"
            class="filter-btn"
            style="border-color: #ddd6fe; background: #fff; color: #6d28d9"
          >
            HNX
          </button>
          <button
            onclick="setSan('UPCOM')"
            id="btnUpcom"
            class="filter-btn"
            style="border-color: #d1fae5; background: #fff; color: #065f46"
          >
            UPCOM
          </button>
        </div>
        <!-- Sort -->
        <select
          id="sortSelect"
          onchange="renderTable()"
          style="
            padding: 9px 12px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            color: #475569;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
          "
        >
          <option value="sym">Mã A → Z</option>
          <option value="title">Tên A → Z</option>
          <option value="san">Theo sàn</option>
        </select>
        <!-- Analyze sector button -->
        <button
          onclick="openAnalysis()"
          style="
            padding: 9px 16px;
            border-radius: 10px;
            border: 1.5px solid #c7d2fe;
            background: #eef2ff;
            color: #4f46e5;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.15s;
            white-space: nowrap;
          "
          onmouseenter="this.style.background='#e0e7ff'"
          onmouseleave="this.style.background='#eef2ff'"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83" />
            <path d="M22 12A10 10 0 0 0 12 2v10z" />
          </svg>
          Phân tích ngành
        </button>
        <!-- Fetch history button -->
        <button
          id="btnFetchHistory"
          onclick="fetchAllHistory()"
          style="
            margin-left: auto;
            padding: 9px 16px;
            border-radius: 10px;
            border: 1.5px solid #bbf7d0;
            background: #f0fdf4;
            color: #15803d;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.15s;
            white-space: nowrap;
          "
          onmouseenter="this.style.background='#dcfce7'"
          onmouseleave="this.style.background='#f0fdf4'"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <polyline points="8 17 12 21 16 17" />
            <line x1="12" y1="3" x2="12" y2="21" />
          </svg>
          <span id="btnFetchHistoryLabel">Tải lịch sử giá</span>
        </button>
      </div>

      <!-- Table -->
      <div
        class="table-wrap"
        style="flex: 1; overflow-y: auto; padding: 0 28px 40px"
      >
        <div
          style="
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-top: 16px;
          "
        >
          <!-- Sticky header bên trong card -->
          <div
            style="
              display: grid;
              grid-template-columns: 90px 1fr 100px 1fr;
              padding: 10px 16px;
              position: sticky;
              top: 0;
              background: #f8fafc;
              border-bottom: 1.5px solid #e2e8f0;
              z-index: 2;
            "
          >
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: #94a3b8;
                letter-spacing: 0.8px;
                text-transform: uppercase;
              "
            >
              Mã CK
            </div>
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: #94a3b8;
                letter-spacing: 0.8px;
                text-transform: uppercase;
              "
            >
              Tên công ty
            </div>
            <div
              style="
                font-size: 11px;
                font-weight: 700;
                color: #94a3b8;
                letter-spacing: 0.8px;
                text-transform: uppercase;
              "
            >
              Sàn GD
            </div>
            <div
              class="hdr-nganh"
              style="
                font-size: 11px;
                font-weight: 700;
                color: #94a3b8;
                letter-spacing: 0.8px;
                text-transform: uppercase;
              "
            >
              Ngành ICB
            </div>
          </div>
          <div id="tableBody"></div>
        </div>
      </div>
    </main>

    <!-- ═══ ANALYSIS MODAL ═══ -->
    <div
      id="analysisOverlay"
      onclick="closeAnalysis()"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.6);
        z-index: 100;
        backdrop-filter: blur(4px);
      "
    ></div>
    <div
      id="analysisModal"
      style="
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 96vw;
        max-width: 1400px;
        height: 92vh;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        z-index: 101;
        flex-direction: column;
        overflow: hidden;
      "
    >
      <div
        style="
          padding: 18px 24px;
          border-bottom: 1px solid #e2e8f0;
          display: flex;
          align-items: center;
          justify-content: space-between;
          flex-shrink: 0;
          background: #fff;
        "
      >
        <div>
          <div
            style="
              font-family: 'Syne', sans-serif;
              font-weight: 800;
              font-size: 17px;
              color: #0f172a;
            "
          >
            Phân tích ngành:
            <span id="analysisTitle" style="color: #4f46e5"></span>
          </div>
          <div
            id="analysisSubtitle"
            style="font-size: 12px; color: #64748b; margin-top: 3px"
          >
            Đang tải...
          </div>
        </div>
        <div style="display: flex; gap: 8px; align-items: center">
          <button
            onclick="runAnalysis()"
            style="
              padding: 6px 14px;
              border-radius: 8px;
              border: 1.5px solid #e2e8f0;
              background: #f8fafc;
              color: #475569;
              font-size: 12px;
              font-weight: 600;
              cursor: pointer;
            "
            onmouseenter="this.style.background='#f1f5f9'"
            onmouseleave="this.style.background='#f8fafc'"
          >
            ↺ Làm mới
          </button>
          <button
            onclick="closeAnalysis()"
            style="
              width: 32px;
              height: 32px;
              border-radius: 8px;
              border: 1.5px solid #e2e8f0;
              background: #f8fafc;
              color: #64748b;
              font-size: 18px;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
              line-height: 1;
            "
          >
            ×
          </button>
        </div>
      </div>
      <div
        id="analysisContent"
        style="overflow-y: auto; overflow-x: hidden; padding: 20px 28px; flex: 1"
      ></div>
    </div>

    <script>
      function openSidebar() {
        document.getElementById("sidebar").classList.add("open");
        document.getElementById("overlay").classList.add("open");
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("open");
      }
      function applyMobilePadding() {
        document.getElementById("mainContent").style.paddingTop =
          window.innerWidth < 768 ? "52px" : "0";
      }
      applyMobilePadding();
      window.addEventListener("resize", applyMobilePadding);

      const params = new URLSearchParams(location.search);
      const sectorName = params.get("sector") || "";

      let allStocks = [];
      let sanFilter = "";

      function setSan(v) {
        sanFilter = v;
        document.getElementById("btnAll").style.background =
          v === "" ? "#e0f2fe" : "#f1f5f9";
        document.getElementById("btnAll").style.borderColor =
          v === "" ? "#7dd3fc" : "#cbd5e1";
        document.getElementById("btnAll").style.color =

        document.getElementById("btnHastc").style.borderColor =

      }

      function renderTable() {
        const q = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();
        const sort = document.getElementById("sortSelect").value;

        let rows = allStocks.filter((s) => {
          if (sanFilter) {
            const san = s.san || "";
            if (sanFilter === "UPCOM") {
              if (san === "HOSE" || san === "HASTC") return false;
            } else if (san !== sanFilter) return false;
          }
          if (
            q &&
            !s.symbol.toLowerCase().includes(q) &&
            !(s.title || "").toLowerCase().includes(q)
          )
            return false;
          return true;
        });

        rows.sort((a, b) => {
          if (sort === "title") return a.title.localeCompare(b.title, "vi");
          if (sort === "san") return a.san.localeCompare(b.san);
          return a.symbol.localeCompare(b.symbol);
        });

        document.getElementById("tableBody").innerHTML =
          rows.length === 0
            ? `<div style="padding:40px;text-align:center;color:#94a3b8;font-size:14px">Không tìm thấy kết quả</div>`
            : rows
                .map((s) => {
                  const sanLabel = s.san === "HASTC" ? "HNX" : s.san || "UPCOM";
                  const sanClass =
                    s.san === "HOSE"
                      ? "san-hose"
                      : s.san === "HASTC"
                      ? "san-hastc"
                      : "san-upcom";
                  return `
          <a class="stock-row" href="/detail.html?s=${
            s.symbol
          }" target="_blank">
            <div style="font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;color:#0f172a">${
              s.symbol
            }</div>
            <div style="font-size:14px;color:#334155;font-weight:500;padding-right:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${
              s.title || "—"
            }</div>
            <div><span class="san-badge ${sanClass}">${sanLabel}</span></div>
            <div class="col-nganh" style="font-size:13px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${
              s.nganh || "—"
            }</div>
          </a>`;
                })
                .join("");

        document.getElementById("pageSub").textContent =
          `${rows.length} / ${allStocks.length} cổ phiếu` +
          (sanFilter ? ` · ${sanFilter}` : "");
      }

      async function init() {
        document.getElementById("pageTitle").textContent =
          sectorName || "Ngành";

        try {
          const all = await fetch("/api/sectors").then((r) => r.json());
          const sector = all.find((s) => s.name === sectorName);

            document.getElementById("pageSub").textContent =
              "Không tìm thấy ngành: " + sectorName;
            return;
          }
          allStocks = sector.stocks;

          const hastc = allStocks.filter((x) => x.san === "HASTC").length;
          const upcom = allStocks.filter(
            (x) => x.san !== "HOSE" && x.san !== "HASTC"
          ).length;

          document.getElementById("statPills").innerHTML = `

              allStocks.length
            }</span>
          </div>
          <div style="padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe">

          </div>
          <div style="padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe">

          </div>
          ${

      init();

      async function fetchAllHistory() {
        if (!allStocks.length) return;
        const btn = document.getElementById("btnFetchHistory");
        const label = document.getElementById("btnFetchHistoryLabel");
        const total = allStocks.length;
        let done = 0,
          failed = 0;

        btn.disabled = true;
        btn.style.opacity = "0.7";
        btn.style.cursor = "not-allowed";

        const updateLabel = () => {
          label.textContent = `Đang tải... (${done}/${total})`;
        };
        updateLabel();

        // Fetch in batches of 5 concurrent to avoid overloading
        const BATCH = 5;
        for (let i = 0; i < total; i += BATCH) {
          const slice = allStocks.slice(i, i + BATCH);
          await Promise.all(
            slice.map(async (s) => {
              try {
                const r = await fetch(
                  `/api/history-fetch?symbol=${s.symbol}&days=420`
                );
                const j = await r.json();
                if (!j.ok) failed++;
              } catch {
                failed++;
              }
              done++;
              updateLabel();
            })
          );
        }

        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
        const msg =
          failed > 0
            ? `✓ ${done - failed}/${total} · Lỗi: ${failed}`
            : `✓ ${done} mã đã tải xong`;
        label.textContent = msg;
        btn.style.background = failed > 0 ? "#fef3c7" : "#d1fae5";
        btn.style.borderColor = failed > 0 ? "#fde68a" : "#6ee7b7";
        btn.style.color = failed > 0 ? "#92400e" : "#065f46";
        // Reset after 5s
        setTimeout(() => {
          label.textContent = "Tải lịch sử giá";
          btn.style.background = "#f0fdf4";
          btn.style.borderColor = "#bbf7d0";
          btn.style.color = "#15803d";
        }, 5000);
      }

      // ─── Sector Analysis Modal ────────────────────────────────────────────────
      function openAnalysis() {
        if (!allStocks.length) return;
        document.getElementById("analysisOverlay").style.display = "block";
        document.getElementById("analysisModal").style.display = "flex";
        document.getElementById("analysisTitle").textContent = sectorName;
        runAnalysis();

      function closeAnalysis() {
        document.getElementById("analysisOverlay").style.display = "none";
        document.getElementById("analysisModal").style.display = "none";
        _analysisRunning = false;
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeAnalysis();
      });

      let _analysisRunning = false;

      async function runAnalysis() {
        if (_analysisRunning) return;
        _analysisRunning = true;
        const content = document.getElementById("analysisContent");
        const subtitle = document.getElementById("analysisSubtitle");

        content.innerHTML =
          '<div style="text-align:center;padding:60px 0;color:#64748b">' +
          '<div style="font-size:24px;margin-bottom:12px">📡</div>' +
          '<div style="font-size:14px;font-weight:600;color:#334155">Đang lấy dữ liệu thị trường...</div>' +
          '<div style="font-size:12px;color:#94a3b8;margin-top:6px">Kết nối SSI iboard · toàn thị trường</div>' +
          '</div>';
        subtitle.textContent = "Đang tải...";

        const symbols = allStocks.map((s) => s.symbol).join(",");
        const stockMap = {};
        allStocks.forEach((s) => (stockMap[s.symbol] = s));
        try {
          const [data, allSectors] = await Promise.all([
            fetch("/api/sector-analysis?symbols=" + encodeURIComponent(symbols)).then((r) => r.json()),
            fetch("/api/all-sectors-analysis").then((r) => r.json()).catch(() => null),
          ]);
          renderAnalysis(data, stockMap, allSectors);
          const snapCount = data.stocks ? data.stocks.filter(s => s.fromSnapshot).length : 0;
          subtitle.textContent =
            "Phân tích " + data.withHistory + "/" + data.total + " mã" +
            (snapCount > 0 ? " · " + snapCount + " mã từ snapshot" : "") +
            (data.noData > 0 ? " · " + data.noData + " mã không có data" : "");
        } catch (e) {
          content.innerHTML =
            '<div style="text-align:center;padding:40px;color:#dc2626;font-size:14px">Lỗi: ' + e.message + "</div>";
          subtitle.textContent = "Lỗi";
        }
        _analysisRunning = false;
      }

      function renderAnalysis(data, stockMap, allSectors) {
        const content = document.getElementById("analysisContent");
        const {
          breadth,
          avgChange1D,
          technical,
          topUp,
          topDown,
          topVolume,
          momentum,
          score,
          withHistory,
          total,
          noData,
        } = data;

        if (withHistory === 0) {
          content.innerHTML =
            '<div style="text-align:center;padding:60px;color:#64748b">' +
            '<div style="font-size:32px;margin-bottom:16px">📭</div>' +
            '<div style="font-size:15px;font-weight:600">Chưa có lịch sử giá nào</div>' +
            '<div style="font-size:13px;margin-top:8px;color:#94a3b8">Nhấn "Tải lịch sử giá" để tải về rồi phân tích lại</div>' +
            "</div>";
          return;
        }

        const scoreColor =
          score >= 65 ? "#16a34a" : score >= 40 ? "#d97706" : "#dc2626";
        const scoreBg =
          score >= 65 ? "#dcfce7" : score >= 40 ? "#fef3c7" : "#fee2e2";
        const scoreLabel =
          score >= 65 ? "Mạnh" : score >= 40 ? "Trung bình" : "Yếu";
        const avgColor =
          avgChange1D > 0
            ? "#16a34a"
            : avgChange1D < 0
            ? "#dc2626"
            : "#64748b";
        const avgSign = avgChange1D >= 0 ? "+" : "";
        const ma50Pct =
          technical.totalMA50 > 0
            ? Math.round((technical.aboveMA50 / technical.totalMA50) * 100)
            : 0;
        const ma200Pct =
          technical.totalMA200 > 0
            ? Math.round((technical.aboveMA200 / technical.totalMA200) * 100)
            : 0;
        const ma50Color =
          ma50Pct >= 60 ? "#16a34a" : ma50Pct >= 40 ? "#d97706" : "#dc2626";
        const ma200Color =
          ma200Pct >= 60 ? "#16a34a" : ma200Pct >= 40 ? "#d97706" : "#dc2626";

        let html = "";

        // ── Section 1: Overview cards ─────────────────────────────────────────
        html +=
          '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px">';

        // Score

          '<div style="background:' +

          scoreColor +
          '40;border-radius:12px;padding:16px;text-align:center">' +
          '<div style="font-size:10px;font-weight:700;color:' +

          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px">TB NGÀNH HÔM NAY</div>' +

          '">' +

          withHistory +
          " mã phân tích</div></div>";

        // Breadth
        html +=
          '<div style="background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px">ĐỘ RỘNG THỊ TRƯỜNG</div>' +

          '<div style="text-align:center"><div style="font-family:\'IBM Plex Mono\',monospace;font-size:22px;font-weight:700;color:#16a34a">' +

          (breadth.down || 0.01) +

        html += "</div>";

        // ── Section 1b: All-sectors comparison ────────────────────────────────
        if (allSectors && Array.isArray(allSectors) && allSectors.length > 0) {
          const scoreRank = allSectors.findIndex((s) => s.name === sectorName) + 1;
          const byChange = [...allSectors].sort((a, b) => b.avgChange1D - a.avgChange1D);
          const changeRank = byChange.findIndex((s) => s.name === sectorName) + 1;
          const total = allSectors.length;
          const maxAbs = Math.max(...allSectors.map((s) => Math.abs(s.avgChange1D)), 0.01);

          const rankColor = (r, t) =>
            r <= Math.ceil(t * 0.25) ? "#16a34a" : r <= Math.ceil(t * 0.5) ? "#d97706" : "#dc2626";

          // Rank badges row
          html += '<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">';

          if (scoreRank > 0) {
            const sc = rankColor(scoreRank, total);
            const sb = rankBg(scoreRank, total);
            const sbd = rankBorder(scoreRank, total);
            html +=
              '<div style="background:' + sb + ';border:1.5px solid ' + sbd + ';border-radius:10px;padding:10px 20px;text-align:center;min-width:110px">' +
              '<div style="font-size:10px;font-weight:700;color:' + sc + ';letter-spacing:0.5px;text-transform:uppercase">Xếp hạng điểm</div>' +
              '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:30px;font-weight:700;color:' + sc + ';line-height:1.1">#' + scoreRank + '</div>' +
              '<div style="font-size:11px;color:#64748b;margin-top:2px">trên ' + total + ' ngành</div>' +
              '</div>';
          }

          if (changeRank > 0) {
            const cc = rankColor(changeRank, total);
            const cb = rankBg(changeRank, total);
            const cbd = rankBorder(changeRank, total);
            html +=
              '<div style="background:' + cb + ';border:1.5px solid ' + cbd + ';border-radius:10px;padding:10px 20px;text-align:center;min-width:110px">' +
              '<div style="font-size:10px;font-weight:700;color:' + cc + ';letter-spacing:0.5px;text-transform:uppercase">Tăng trưởng hôm nay</div>' +
              '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:30px;font-weight:700;color:' + cc + ';line-height:1.1">#' + changeRank + '</div>' +
              '<div style="font-size:11px;color:#64748b;margin-top:2px">trên ' + total + ' ngành</div>' +
              '</div>';
          }

          html += '</div>';

          // Table header
          html +=
            '<div style="display:grid;grid-template-columns:32px 1fr 120px 72px 52px;align-items:center;gap:8px;padding:5px 10px;margin-bottom:4px">' +
            '<div style="font-size:10px;font-weight:700;color:#cbd5e1;text-align:center">#</div>' +
            '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;text-transform:uppercase">Ngành</div>' +
            '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;text-transform:uppercase">Hôm nay</div>' +
            '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;text-transform:uppercase;text-align:right">% thay đổi</div>' +
            '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.5px;text-transform:uppercase;text-align:center">Điểm</div>' +
            '</div>';

          // Scrollable sector list
          html += '<div style="max-height:260px;overflow-y:auto;border:1px solid #f1f5f9;border-radius:8px">';
          allSectors.forEach(function (sec, i) {
            const isCurrent = sec.name === sectorName;
            const rowBg = isCurrent ? "#eef2ff" : i % 2 === 0 ? "#fff" : "#fafafa";
            const rowBorder = isCurrent ? "1.5px solid #c7d2fe" : "1px solid transparent";
            const chgColor = sec.avgChange1D > 0 ? "#16a34a" : sec.avgChange1D < 0 ? "#dc2626" : "#94a3b8";
            const barColor = sec.avgChange1D >= 0 ? "#86efac" : "#fca5a5";
            const barPct = ((Math.abs(sec.avgChange1D) / maxAbs) * 100).toFixed(1);
            const sc = sec.score >= 65 ? "#16a34a" : sec.score >= 40 ? "#d97706" : "#dc2626";
            const sb = sec.score >= 65 ? "#dcfce7" : sec.score >= 40 ? "#fef3c7" : "#fee2e2";
            html +=
              '<div style="display:grid;grid-template-columns:32px 1fr 120px 72px 52px;align-items:center;gap:8px;padding:7px 10px;background:' + rowBg + ';border:' + rowBorder + ';border-radius:6px;margin-bottom:1px;cursor:pointer;transition:background 0.1s" onclick="location.href=\'/sector-detail.html?sector=' + encodeURIComponent(sec.name) + '\'" onmouseenter="this.style.background=\'' + (isCurrent ? "#e0e7ff" : "#f1f5f9") + '\'" onmouseleave="this.style.background=\'' + rowBg + '\'">' +
              '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:700;color:#94a3b8;text-align:center">' + (i + 1) + '</div>' +
              '<div style="font-size:13px;font-weight:' + (isCurrent ? "700" : "500") + ';color:' + (isCurrent ? "#4f46e5" : "#334155") + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' +
              sec.name + (isCurrent ? " ◀" : "") + '</div>' +
              '<div style="display:flex;align-items:center;gap:4px">' +
              '<div style="flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden">' +
              '<div style="height:6px;background:' + barColor + ';border-radius:3px;width:' + barPct + '%"></div></div>' +
              '<span style="font-size:10px;color:#94a3b8">' + sec.withHistory + '/' + sec.total + '</span></div>' +
              '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:12px;font-weight:700;color:' + chgColor + ';text-align:right">' +
              (sec.avgChange1D >= 0 ? "+" : "") + sec.avgChange1D + "%</div>" +
              '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:700;color:' + sc + ';background:' + sb + ';padding:2px 6px;border-radius:5px;text-align:center">' + sec.score + '</div>' +
              '</div>';
          });
          html += '</div></div>';
        }

        // ── Section 2: Top tăng/giảm ─────────────────────────────────────────
        html +=
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
        html +=
          '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px">↑ TOP TĂNG HÔM NAY</div>';
        if (topUp && topUp.length)
          topUp.forEach(function (s) {
            html += _stockRow(s, stockMap);
          });
        else
          html +=
            '<div style="color:#94a3b8;font-size:13px;padding:16px 0;text-align:center">Không có dữ liệu</div>';
        html += "</div>";

        html +=
          '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px">↓ TOP GIẢM HÔM NAY</div>';
        if (topDown && topDown.length)
          topDown.forEach(function (s) {
            html += _stockRow(s, stockMap);
          });
        else
          html +=
            '<div style="color:#94a3b8;font-size:13px;padding:16px 0;text-align:center">Không có dữ liệu</div>';
        html += "</div>";
        html += "</div>";

        // ── Section 3: Volume surge ───────────────────────────────────────────
        html +=
          '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:20px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px">⚡ KHỐI LƯỢNG ĐỘT BIẾN (SO VỚI MA20)</div>';
        if (topVolume && topVolume.length) {
          html +=
            '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">';
          topVolume.forEach(function (s) {
            html += _volumeCard(s, stockMap);
          });
          html += "</div>";
        } else {
          html +=
            '<div style="color:#94a3b8;font-size:13px;padding:16px 0;text-align:center">Không có dữ liệu</div>';
        }
        html += "</div>";

        // ── Section 4: Technical strength ────────────────────────────────────
        html +=
          '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:20px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:16px">📐 SỨC MẠNH KỸ THUẬT</div>';
        if (technical.totalMA50 > 0) {
          html +=
            '<div style="margin-bottom:14px">' +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
            '<div style="font-size:13px;font-weight:600;color:#334155">Trên MA50 <span style="font-size:12px;color:#94a3b8;font-weight:400">(' +
            technical.aboveMA50 +
            "/" +
            technical.totalMA50 +
            " mã)</span></div>" +
            '<div style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:14px;color:' +
            ma50Color +
            '">' +
            ma50Pct +
            "%</div></div>" +
            '<div style="height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden">' +
            '<div style="height:8px;background:' +
            ma50Color +
            ";border-radius:4px;width:" +
            ma50Pct +
            '%"></div></div></div>';
        }
        if (technical.totalMA200 > 0) {
          html +=
            "<div>" +
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
            '<div style="font-size:13px;font-weight:600;color:#334155">Trên MA200 <span style="font-size:12px;color:#94a3b8;font-weight:400">(' +
            technical.aboveMA200 +
            "/" +
            technical.totalMA200 +
            " mã)</span></div>" +
            '<div style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:14px;color:' +
            ma200Color +
            '">' +
            ma200Pct +
            "%</div></div>" +
            '<div style="height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden">' +
            '<div style="height:8px;background:' +
            ma200Color +
            ";border-radius:4px;width:" +
            ma200Pct +
            '%"></div></div></div>';
        }
        if (technical.totalMA50 === 0 && technical.totalMA200 === 0) {
          html +=
            '<div style="color:#94a3b8;font-size:13px;padding:8px 0">Cần ít nhất 50 phiên dữ liệu để tính MA</div>';
        }
        html += "</div>";

        // ── Section 5: Momentum tabs ──────────────────────────────────────────
        html +=
          '<div style="background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:16px">' +
          '<div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:12px">🚀 MOMENTUM — TOP PERFORMERS</div>' +
          '<div style="display:flex;gap:6px;margin-bottom:14px">' +
          '<button id="momTab1W" onclick="switchMomTab(\'1W\')" style="padding:5px 16px;border-radius:7px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569;transition:all 0.12s">1 Tuần</button>' +
          '<button id="momTab1M" onclick="switchMomTab(\'1M\')" style="padding:5px 16px;border-radius:7px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569;transition:all 0.12s">1 Tháng</button>' +
          '<button id="momTab3M" onclick="switchMomTab(\'3M\')" style="padding:5px 16px;border-radius:7px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#475569;transition:all 0.12s">3 Tháng</button>' +
          "</div>" +
          '<div id="momContent1W">' +
          _momentumTable(momentum.top1W, stockMap) +
          "</div>" +
          '<div id="momContent1M" style="display:none">' +
          _momentumTable(momentum.top1M, stockMap) +
          "</div>" +
          '<div id="momContent3M" style="display:none">' +
          _momentumTable(momentum.top3M, stockMap) +
          "</div></div>";

        content.innerHTML = html;
        switchMomTab("1W");
      }
    </script>
  </body>
</html>
