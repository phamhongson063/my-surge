<!DOCTYPE html>
<html lang="vi" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chi tiết Ngành — My Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"IBM Plex Mono"', "monospace"],
            display: ["Syne", "sans-serif"],
            sans: ['"Inter"', "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      font-size: 14px; font-weight: 500; text-decoration: none;
      color: #94a3b8; transition: color .15s, background .15s;
    }
    .nav-link:hover { color: #1e293b; background: #f1f5f9; }
    .nav-link.active { color: #3b82f6; background: #eff6ff; font-weight: 600; }
    .stock-row {
      display: grid;
      grid-template-columns: 90px 1fr 100px 1fr;
      align-items: center;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .12s;
      text-decoration: none;
      color: inherit;
      border-bottom: 1px solid #f8fafc;
    }
    .stock-row:hover { background: #f8fafc; }
    .san-badge {
      font-size: 11px; font-weight: 700; letter-spacing: .5px;
      padding: 3px 9px; border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace;
      display: inline-block;
    }
    .san-hose  { background: #dbeafe; color: #1d4ed8; }
    .san-hastc { background: #ede9fe; color: #6d28d9; }
    input::placeholder { color: #94a3b8; }
    input:focus { border-color: #93c5fd !important; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    select:focus { outline: none; border-color: #93c5fd !important; }
    .filter-btn {
      padding: 7px 16px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: 1.5px solid;
      transition: all .15s;
    }
  </style>
</head>
<body class="h-full font-sans flex" style="background:#f1f5f9">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="shrink-0 flex flex-col sticky top-0 h-screen" style="width:248px;background:#fff;border-right:1px solid #e2e8f0;box-shadow:2px 0 8px rgba(0,0,0,.04)">
    <div style="padding:22px 20px 18px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3b82f6,#6366f1);box-shadow:0 4px 12px rgba(99,102,241,.3)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 3v18h18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M7 16l4-5 4 3 4-6" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#0f172a;letter-spacing:-.4px">My Stock</div>
    </div>

    <nav class="flex-1 overflow-y-auto p-3 flex flex-col gap-1">
      <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;padding:8px 14px 4px;text-transform:uppercase">Menu</div>
      <a href="/surge.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Volume Surge
      </a>
      <a href="/detail.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/></svg>
        Phân tích chi tiết
      </a>
      <a href="/watchlist.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Watchlist
      </a>
      <a href="/sector.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Ngành
      </a>
    </nav>

    <div style="padding:14px 20px;border-top:1px solid #f1f5f9;font-size:12px;color:#94a3b8">
      Nguồn: CafeF
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="flex-1 flex flex-col" style="min-height:0;overflow:hidden">

    <!-- Header -->
    <div style="padding:28px 36px 22px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0">
      <a href="/sector.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#64748b;text-decoration:none;margin-bottom:14px;font-weight:500;transition:color .15s"
         onmouseenter="this.style.color='#3b82f6'" onmouseleave="this.style.color='#64748b'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        Tất cả ngành
      </a>

      <div style="display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap">
        <div>
          <div id="pageTitle" style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#0f172a;letter-spacing:-.5px">—</div>
          <div id="pageSub" style="font-size:14px;color:#64748b;margin-top:4px;font-weight:500">Đang tải...</div>
        </div>
        <div id="statPills" style="display:flex;gap:8px;padding-bottom:3px"></div>
      </div>
    </div>

    <!-- Controls -->
    <div style="padding:16px 36px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;background:#fff;border-bottom:1px solid #e2e8f0">
      <!-- Search -->
      <div style="position:relative;flex:1;min-width:200px;max-width:340px">
        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="text" placeholder="Tìm mã, tên công ty..."
          style="width:100%;padding:9px 12px 9px 34px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;color:#0f172a;font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s"
          oninput="renderTable()"/>
      </div>
      <!-- Filter sàn -->
      <div style="display:flex;gap:6px">
        <button onclick="setSan('')" id="btnAll" class="filter-btn" style="border-color:#cbd5e1;background:#f1f5f9;color:#475569">Tất cả</button>
        <button onclick="setSan('HOSE')" id="btnHose" class="filter-btn" style="border-color:#bfdbfe;background:#fff;color:#1d4ed8">HOSE</button>
        <button onclick="setSan('HASTC')" id="btnHastc" class="filter-btn" style="border-color:#ddd6fe;background:#fff;color:#6d28d9">HNX</button>
      </div>
      <!-- Sort -->
      <select id="sortSelect" onchange="renderTable()"
        style="padding:9px 12px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;color:#475569;font-size:13px;font-weight:500;cursor:pointer">
        <option value="sym">Mã A → Z</option>
        <option value="title">Tên A → Z</option>
        <option value="san">Theo sàn</option>
      </select>
    </div>

    <!-- Table -->
    <div style="flex:1;overflow-y:auto;padding:0 28px 40px">
      <div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;margin-top:16px">
        <!-- Sticky header bên trong card -->
        <div style="display:grid;grid-template-columns:90px 1fr 100px 1fr;padding:10px 16px;position:sticky;top:0;background:#f8fafc;border-bottom:1.5px solid #e2e8f0;z-index:2">
          <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase">Mã CK</div>
          <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase">Tên công ty</div>
          <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase">Sàn GD</div>
          <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase">Ngành gốc</div>
        </div>
        <div id="tableBody"></div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const sectorName = params.get("sector") || "";

    let allStocks = [];
    let sanFilter = "";

    function setSan(v) {
      sanFilter = v;
      document.getElementById("btnAll").style.background   = v === ""       ? "#e0f2fe" : "#f1f5f9";
      document.getElementById("btnAll").style.borderColor  = v === ""       ? "#7dd3fc" : "#cbd5e1";
      document.getElementById("btnAll").style.color        = v === ""       ? "#0369a1" : "#475569";
      document.getElementById("btnHose").style.background  = v === "HOSE"   ? "#dbeafe" : "#fff";
      document.getElementById("btnHose").style.borderColor = v === "HOSE"   ? "#60a5fa" : "#bfdbfe";
      document.getElementById("btnHose").style.color       = v === "HOSE"   ? "#1e40af" : "#1d4ed8";
      document.getElementById("btnHastc").style.background  = v === "HASTC" ? "#ede9fe" : "#fff";
      document.getElementById("btnHastc").style.borderColor = v === "HASTC" ? "#a78bfa" : "#ddd6fe";
      document.getElementById("btnHastc").style.color       = v === "HASTC" ? "#4c1d95" : "#6d28d9";
      renderTable();
    }

    function renderTable() {
      const q    = document.getElementById("searchInput").value.toLowerCase().trim();
      const sort = document.getElementById("sortSelect").value;

      let rows = allStocks.filter(s => {
        if (sanFilter && s.san !== sanFilter) return false;
        if (q && !s.symbol.toLowerCase().includes(q) && !s.title.toLowerCase().includes(q)) return false;
        return true;
      });

      rows.sort((a, b) => {
        if (sort === "title") return a.title.localeCompare(b.title, "vi");
        if (sort === "san")   return a.san.localeCompare(b.san);
        return a.symbol.localeCompare(b.symbol);
      });

      document.getElementById("tableBody").innerHTML = rows.length === 0
        ? `<div style="padding:40px;text-align:center;color:#94a3b8;font-size:14px">Không tìm thấy kết quả</div>`
        : rows.map(s => `
          <a class="stock-row" href="/detail.html?s=${s.symbol}" target="_blank">
            <div style="font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;color:#0f172a">${s.symbol}</div>
            <div style="font-size:14px;color:#334155;font-weight:500;padding-right:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</div>
            <div>
              <span class="san-badge ${s.san === 'HOSE' ? 'san-hose' : 'san-hastc'}">${s.san === 'HASTC' ? 'HNX' : s.san}</span>
            </div>
            <div style="font-size:13px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.nganh || '—'}</div>
          </a>`).join("");

      document.getElementById("pageSub").textContent =
        `${rows.length} / ${allStocks.length} cổ phiếu` + (sanFilter ? ` · ${sanFilter}` : "");
    }

    async function init() {
      document.getElementById("pageTitle").textContent = sectorName || "Ngành";
      try {
        const all = await fetch("/api/sectors").then(r => r.json());
        const sector = all.find(s => s.name === sectorName);
        if (!sector) {
          document.getElementById("pageSub").textContent = "Không tìm thấy ngành: " + sectorName;
          return;
        }
        allStocks = sector.stocks;

        const hose  = allStocks.filter(x => x.san === "HOSE").length;
        const hastc = allStocks.filter(x => x.san === "HASTC").length;

        document.getElementById("statPills").innerHTML = `
          <div style="padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0">
            Tổng <span style="color:#0f172a;margin-left:4px;font-weight:700">${allStocks.length}</span>
          </div>
          <div style="padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe">
            HOSE <span style="margin-left:4px;font-weight:700">${hose}</span>
          </div>
          <div style="padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;background:#ede9fe;color:#6d28d9;border:1px solid #ddd6fe">
            HNX <span style="margin-left:4px;font-weight:700">${hastc}</span>
          </div>`;

        renderTable();
      } catch (e) {
        document.getElementById("pageSub").textContent = "Lỗi: " + e.message;
      }
    }
    init();
  </script>
</body>
</html>
