<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Stock — Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --glass: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.2);
  --glass-hover: rgba(255,255,255,0.22);
  --taskbar: rgba(20,20,30,0.72);
  --accent: #60a5fa;
  --text-primary: #fff;
  --text-secondary: rgba(255,255,255,0.75);
  --text-muted: rgba(255,255,255,0.45);
  --shadow: 0 8px 32px rgba(0,0,0,0.35);
  --font: 'Segoe UI', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; user-select: none; }

/* ── Wallpaper ── */
body {
  font-family: var(--font);
  background: #0a0e1a;
  color: var(--text-primary);
  position: relative;
}

.wallpaper {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 40%, rgba(56,100,200,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 20%, rgba(120,60,200,0.4) 0%, transparent 55%),
    radial-gradient(ellipse 50% 50% at 60% 80%, rgba(20,140,200,0.35) 0%, transparent 55%),
    linear-gradient(135deg, #050a18 0%, #0d1635 40%, #0a1228 100%);
}

/* Subtle light ray */
.wallpaper::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 120% 80% at 30% 50%, rgba(100,160,255,0.07) 0%, transparent 60%);
}

/* Mountain silhouette */
.mountain {
  position: fixed; bottom: 48px; left: 0; right: 0; z-index: 1;
  height: 220px;
  background:
    linear-gradient(to top, rgba(10,20,50,0.8) 0%, transparent 100%);
  clip-path: polygon(0 100%, 0 70%, 8% 45%, 16% 62%, 24% 30%, 32% 55%, 38% 38%, 45% 20%, 52% 40%, 58% 25%, 65% 45%, 72% 30%, 80% 55%, 88% 38%, 94% 52%, 100% 35%, 100% 100%);
}

/* ── Desktop area ── */
.desktop {
  position: relative; z-index: 2;
  height: calc(100vh - 48px);
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Top bar: time + system tray minimal */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 24px;
}

.desktop-clock {
  text-align: left;
}
.clock-time {
  font-size: 48px;
  font-weight: 200;
  letter-spacing: -2px;
  color: rgba(255,255,255,0.9);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.clock-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 400;
  letter-spacing: 0.3px;
}

.server-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 5px 14px 5px 10px;
  font-size: 11px;
  color: var(--text-secondary);
  backdrop-filter: blur(8px);
}
.server-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  animation: pulse 2.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

/* ── Icon grid: free-position ── */
.icons-grid {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* ── Desktop Icon ── */
.desktop-icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  padding: 10px 6px 8px;
  border-radius: 8px;
  cursor: default;
  text-decoration: none;
  color: var(--text-primary);
  transition: background .12s;
  position: absolute;
  width: 84px;
  pointer-events: all;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.desktop-icon:hover { background: rgba(255,255,255,0.12); }
.desktop-icon.selected {
  background: rgba(96,165,250,0.25);
  outline: 1px solid rgba(96,165,250,0.5);
}
.desktop-icon.dragging {
  opacity: 0.75;
  z-index: 999;
  transition: none;
  cursor: grabbing !important;
}
.desktop-icon.dragging .icon-img {
  transform: scale(1.1) translateY(-4px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.65);
}

/* Icon image (colored box) */
.icon-img {
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: transform .12s, box-shadow .12s;
}
.desktop-icon:hover .icon-img {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
}
.desktop-icon:active .icon-img {
  transform: translateY(0) scale(0.96);
}

/* Icon colors */
.icon-download  { background: linear-gradient(145deg, #1e6fdc, #0a4faa); }
.icon-surge     { background: linear-gradient(145deg, #dc2626, #991b1b); }
.icon-detail    { background: linear-gradient(145deg, #0891b2, #0e7490); }
.icon-watchlist { background: linear-gradient(145deg, #7c3aed, #5b21b6); }
.icon-portfolio { background: linear-gradient(145deg, #d97706, #b45309); }
.icon-watcher   { background: linear-gradient(145deg, #16a34a, #15803d); }

.icon-label {
  font-size: 11.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  text-align: center;
  line-height: 1.3;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 12px rgba(0,0,0,0.6);
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── Window / App modal ── */
.window-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  display: none;
  animation: fadeIn .15s ease;
}
.window-overlay.open { display: flex; align-items: center; justify-content: center; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes windowOpen {
  from { opacity:0; transform: scale(0.94) translateY(8px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.app-window {
  background: rgba(28,32,48,0.92);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  width: 480px;
  max-width: 92vw;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  backdrop-filter: blur(24px);
  animation: windowOpen .2s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
}

/* Title bar */
.win-titlebar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
}
.win-controls {
  display: flex; gap: 6px;
}
.win-btn {
  width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
  transition: filter .1s;
}
.win-btn:hover { filter: brightness(1.2); }
.win-btn.close  { background: #ff5f57; }
.win-btn.min    { background: #febc2e; }
.win-btn.max    { background: #28c840; }
.win-title-text {
  flex: 1;
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-right: 52px; /* offset controls */
}

/* Window body */
.win-body {
  padding: 24px;
}

.win-icon-large {
  width: 64px; height: 64px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.win-app-name {
  text-align: center;
  font-size: 20px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 6px;
}
.win-app-desc {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 20px;
}
.win-tags {
  display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
  margin-bottom: 24px;
}
.win-tag {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-muted);
  background: rgba(255,255,255,0.05);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  letter-spacing: .3px;
}
.win-open-btn {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  transition: filter .15s, transform .1s;
  color: #fff;
  letter-spacing: .2px;
}
.win-open-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.win-open-btn:active { transform: translateY(0); filter: brightness(0.95); }

/* ── Taskbar ── */
.taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  height: 48px;
  background: var(--taskbar);
  backdrop-filter: blur(20px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

/* Center: pinned apps */
.taskbar-center {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 4px;
}

.tb-app {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .12s, transform .1s;
  position: relative;
  text-decoration: none;
}
.tb-app:hover { background: rgba(255,255,255,0.12); }
.tb-app:active { transform: scale(0.93); }
.tb-app .tb-icon {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
/* active dot under icon */
.tb-app.active::after {
  content: '';
  position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent);
}

.taskbar-right {
  display: flex; align-items: center; gap: 14px;
  margin-left: auto;
}
.tb-time {
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  font-variant-numeric: tabular-nums;
  line-height: 1.4;
}
.tb-tray {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s;
}
.tb-tray:hover { background: rgba(255,255,255,0.1); }

/* Start button */
.taskbar-start {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s;
  font-size: 12px;
  color: var(--text-secondary);
}
.taskbar-start:hover { background: rgba(255,255,255,0.1); }

/* ── Context menu on right-click desktop ── */
.ctx-menu {
  position: fixed; z-index: 200;
  background: rgba(30,34,52,0.96);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 4px;
  min-width: 200px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  backdrop-filter: blur(16px);
  display: none;
  animation: fadeIn .1s ease;
}
.ctx-menu.open { display: block; }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background .1s;
}
.ctx-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
.ctx-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 3px 8px; }

/* Double-click ripple */
@keyframes ripple {
  from { transform: scale(0); opacity: 0.6; }
  to   { transform: scale(3); opacity: 0; }
}
.ripple-circle {
  position: fixed; width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(96,165,250,0.4);
  pointer-events: none; z-index: 999;
  animation: ripple .4s ease forwards;
  margin-left: -20px; margin-top: -20px;
}
</style>
</head>

// App data
const apps = {
  download: {
    name: 'Tải dữ liệu',
    desc: 'Nhập mã cổ phiếu, chọn khoảng thời gian và lưu file Excel về thư mục tmp/ để phân tích.',

// Clock
function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const days = ['Chủ nhật','Thứ hai','Thứ ba','Thứ tư','Thứ năm','Thứ sáu','Thứ bảy'];
  const months = ['tháng 1','tháng 2','tháng 3','tháng 4','tháng 5','tháng 6','tháng 7','tháng 8','tháng 9','tháng 10','tháng 11','tháng 12'];
  document.getElementById('clockTime').textContent = `${hh}:${mm}`;
  document.getElementById('clockDate').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('tbTimeLine').textContent = `${hh}:${mm}`;
  document.getElementById('tbDateLine').textContent = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
}
updateClock();
setInterval(updateClock, 15000);

// ── Icon positions (drag & drop) ──
const ICON_W = 84, ICON_H = 100;
const COLS = 1, ROWS = 1; // dynamic
const STORAGE_KEY = 'mystock-icon-positions';

const defaultPositions = {
  download:  {col:0, row:0},
  surge:     {col:0, row:1},
  detail:    {col:0, row:2},
  watchlist: {col:0, row:3},
  portfolio: {col:0, row:4},
  watcher:   {col:0, row:5},
};

function getGridOrigin(){
  // Start after topbar (~100px from top of desktop)
  return { x: 24, y: 100 };
}

function colRowToXY(col, row){
  const o = getGridOrigin();
  return { x: o.x + col * (ICON_W + 10), y: o.y + row * (ICON_H + 8) };
}

function loadPositions(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch{ return {}; }
}
function resetIconPositions(){
  localStorage.removeItem(STORAGE_KEY);
  applyPositions();
  closeCtx();
}
function savePositions(pos){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pos));
}

function applyPositions(){
  const saved = loadPositions();
  document.querySelectorAll('.desktop-icon').forEach(icon => {
    const key = icon.dataset.app;
    let pos;
    if(saved[key]){
      pos = saved[key]; // {x, y} absolute
    } else {
      const cr = defaultPositions[key] || {col:0,row:0};
      pos = colRowToXY(cr.col, cr.row);
    }
    icon.style.left = pos.x + 'px';
    icon.style.top  = pos.y + 'px';
  });
}

// ── Drag & Drop ──
let dragging = null, dragOffX = 0, dragOffY = 0, didDrag = false;
let selectedIcon = null;

function selectIcon(el){
  if(selectedIcon) selectedIcon.classList.remove('selected');
  el.classList.add('selected');
  selectedIcon = el;
}

function getDesktopBounds(){
  const d = document.getElementById('desktop');
  return d.getBoundingClientRect();
}

function clampPosition(x, y){
  const b = getDesktopBounds();
  const maxX = b.width - ICON_W;
  const maxY = b.height - ICON_H - 8;
  return {
    x: Math.max(0, Math.min(x, maxX)),
    y: Math.max(0, Math.min(y, maxY))
  };
}

document.querySelectorAll('.desktop-icon').forEach(icon => {
  // Mouse down → start drag tracking
  icon.addEventListener('mousedown', e => {
    if(e.button !== 0) return;
    e.preventDefault();

    selectIcon(icon);

    const rect = icon.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    dragging = icon;
    didDrag = false;
  });
});

document.addEventListener('mousemove', e => {
  if(!dragging) return;
  const db = getDesktopBounds();
  let x = e.clientX - db.left - dragOffX;
  let y = e.clientY - db.top  - dragOffY;
  const clamped = clampPosition(x, y);

  if(Math.abs(x - parseFloat(dragging.style.left)) > 4 ||
     Math.abs(y - parseFloat(dragging.style.top))  > 4){
    didDrag = true;
  }

  if(didDrag){
    dragging.classList.add('dragging');
    dragging.style.left = clamped.x + 'px';
    dragging.style.top  = clamped.y + 'px';
  }
});

document.addEventListener('mouseup', e => {
  if(!dragging) return;
  if(didDrag){
    const saved = loadPositions();
    saved[dragging.dataset.app] = {
      x: parseFloat(dragging.style.left),
      y: parseFloat(dragging.style.top)
    };
    savePositions(saved);
    dragging.classList.remove('dragging');
  }
  dragging = null;
  didDrag = false;
});

// Deselect on desktop bg click
document.getElementById('desktop').addEventListener('mousedown', e => {
  if(!e.target.closest('.desktop-icon')){
    if(selectedIcon){ selectedIcon.classList.remove('selected'); selectedIcon = null; }
  }
});

// ESC
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeWindow(); });

// Double-click → navigate (only if not dragging)
document.querySelectorAll('.desktop-icon').forEach(icon => {
  icon.addEventListener('dblclick', e => {
    e.preventDefault();
    if(!didDrag){
      const href = icon.dataset.href;
      if(href) window.location.href = href;
    }
  });
});

applyPositions();
</script>
